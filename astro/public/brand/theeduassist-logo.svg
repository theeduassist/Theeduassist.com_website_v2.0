<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <path id="top-curve" d="M 50 150 A 100 100 0 0 1 250 150" fill="transparent" />
    <path id="bottom-curve" d="M 250 150 A 100 100 0 0 1 50 150" fill="transparent" />
  </defs>

  <!-- Outer Ring -->
  <circle cx="150" cy="150" r="145" fill="#77BA55" stroke="#FFFFFF" stroke-width="2" />

  <!-- Inner Circle -->
  <circle cx="150" cy="150" r="115" fill="#27496D" stroke="#FFFFFF" stroke-width="2" />

  <!-- Top Curved Text -->
  <text fill="#FFFFFF" font-family="sans-serif" font-weight="bold" font-size="20" letter-spacing="3">
    <textPath href="#top-curve" startOffset="50%" text-anchor="middle">THEEDUASSIST</textPath>
  </text>

  <!-- Bottom Curved Text -->
  <text fill="#FFFFFF" font-family="sans-serif" font-weight="bold" font-size="14" letter-spacing="1">
    <textPath href="#bottom-curve" startOffset="50%" text-anchor="middle">E-LEARNING DESIGN AGENCY</textPath>
  </text>

  <!-- Stars -->
  <polygon points="35,145 40,155 50,155 42,162 45,172 35,166 25,172 28,162 20,155 30,155" fill="#FFFFFF" />
  <polygon points="265,145 270,155 280,155 272,162 275,172 265,166 255,172 258,162 250,155 260,155" fill="#FFFFFF" />

  <!-- Central Iconography -->
  <!-- Open Book -->
  <path d="M 120 185 Q 135 195 150 185 Q 165 195 180 185 L 180 200 Q 165 210 150 200 Q 135 210 120 200 Z" fill="#FFFFFF" />

  <!-- Desktop Monitor -->
  <rect x="110" y="125" width="80" height="55" rx="5" fill="none" stroke="#FFFFFF" stroke-width="3" />
  <line x1="110" y1="170" x2="190" y2="170" stroke="#FFFFFF" stroke-width="3" />
  <line x1="135" y1="180" x2="165" y2="180" stroke="#FFFFFF" stroke-width="3" />
  <rect x="145" y="180" width="10" height="5" fill="#FFFFFF" />

  <!-- Graduation Cap -->
  <path d="M 150 135 L 125 145 L 150 155 L 175 145 Z" fill="#FFFFFF" />
  <line x1="175" y1="145" x2="175" y2="160" stroke="#FFFFFF" stroke-width="2" />
  <polygon points="173,160 177,160 175,165" fill="#FFFFFF" />

  <!-- Wi-Fi Signal -->
  <path d="M 135 115 Q 150 105 165 115" fill="none" stroke="#FFFFFF" stroke-width="2" />
  <path d="M 142 120 Q 150 115 158 120" fill="none" stroke="#FFFFFF" stroke-width="2" />
  <circle cx="150" cy="123" r="2" fill="#FFFFFF" />

  <!-- Dotted Vertical Line -->
  <line x1="150" y1="75" x2="150" y2="100" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="2 4" />

  <!-- Top Node -->
  <circle cx="150" cy="70" r="5" fill="#FFFFFF" />

  <!-- Symmetrical Circuit Branches -->
  <path d="M 110 150 L 95 150 L 85 135 L 75 135" fill="none" stroke="#FFFFFF" stroke-width="2" />
  <circle cx="75" cy="135" r="3" fill="#FFFFFF" />

  <path d="M 190 150 L 205 150 L 215 135 L 225 135" fill="none" stroke="#FFFFFF" stroke-width="2" />
  <circle cx="225" cy="135" r="3" fill="#FFFFFF" />
</svg>
