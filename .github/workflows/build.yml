name: Build and Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate Environment Safety
        run: npm run validate:env

      - name: Validate Enterprise Architecture
        run: npm run validate:enterprise

      - name: Validate Trust Architecture
        run: npm run validate:trust

      - name: Validate Conversion Architecture
        run: npm run validate:conversion

      - name: Validate Analytics Events
        run: npm run validate:analytics

      - name: Astro Check
        run: npx astro check

      - name: Validate Redirects
        run: npm run validate:redirects

      - name: Check Sanity Blog Public
        run: npm run check:sanity:blog

      - name: Build Project
        run: npm run build
